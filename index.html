<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>°CRYO On — Ops Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#f4f7f9; --surface:#ffffff; --surface2:#eef4f7;
    --border:#dce8ed; --border2:#c8dce5;
    --cyan:#00b4d8; --cyan-dark:#0096b7; --cyan-pale:#e0f4fa;
    --navy:#0a2540; --navy2:#1a3a5c;
    --text:#0a2540; --text2:#4a6580; --text3:#8aa4b8;
    --green:#00c896; --green-pale:#e6faf5;
    --red:#e53e3e; --red-pale:#fdecea;
    --amber:#f59e0b; --amber-pale:#fef3cd;
    --shadow:0 1px 4px rgba(0,40,80,0.07),0 4px 16px rgba(0,40,80,0.05);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
  input[type=number]{-moz-appearance:textfield;}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
  .nav-btn{background:none;border:1.5px solid var(--border);color:var(--text2);padding:7px 18px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;border-radius:8px;transition:all 0.18s;}
  .nav-btn:hover{border-color:var(--cyan);color:var(--cyan);}
  .nav-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .br-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--text2);padding:6px 14px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;border-radius:8px;transition:all 0.15s;}
  .br-btn:hover{border-color:var(--cyan);color:var(--cyan);}
  .br-btn.active{background:var(--cyan);color:#fff;border-color:var(--cyan);}
  .inp{background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:10px 14px;font-family:inherit;font-size:14px;width:100%;outline:none;transition:all 0.15s;border-radius:8px;}
  .inp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,180,216,0.12);}
  .inp::placeholder{color:var(--text3);}
  .inp:disabled{color:var(--cyan-dark);background:var(--cyan-pale);border-color:rgba(0,180,216,0.3);cursor:default;font-weight:600;}
  select{background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:8px 12px;font-family:inherit;font-size:13px;outline:none;border-radius:8px;cursor:pointer;}
  select:focus{border-color:var(--cyan);}
  .save-btn{background:var(--navy);color:#fff;border:none;padding:12px 36px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;border-radius:10px;transition:all 0.18s;box-shadow:0 4px 12px rgba(10,37,64,0.25);}
  .save-btn:hover:not(:disabled){background:var(--navy2);transform:translateY(-1px);}
  .save-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .set-btn{background:var(--cyan);color:#fff;border:none;padding:9px 20px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;border-radius:8px;transition:all 0.15s;white-space:nowrap;}
  .set-btn:hover{background:var(--cyan-dark);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow);}
  .card-hl{background:linear-gradient(135deg,#e8f8fd 0%,#f0fbfe 100%);border:1.5px solid rgba(0,180,216,0.25);border-radius:12px;padding:18px 20px;box-shadow:0 2px 12px rgba(0,180,216,0.08);}
  .lbl{font-size:10px;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;font-weight:600;margin-bottom:6px;}
  .big-num{font-size:24px;font-weight:700;color:var(--text);line-height:1.1;font-family:'DM Mono',monospace;}
  .sub-txt{font-size:11px;color:var(--text3);margin-top:4px;}
  .prog-track{height:5px;background:var(--border);border-radius:4px;margin-top:10px;overflow:hidden;}
  .prog-fill{height:5px;border-radius:4px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}
  .tbl-row{border-bottom:1px solid var(--border);transition:background 0.1s;cursor:pointer;}
  .tbl-row:hover td{background:var(--surface2) !important;}
  .divider{height:1px;background:var(--border);margin:24px 0;}
  .tag-auto{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;letter-spacing:0.1em;padding:2px 8px;border-radius:20px;background:var(--cyan-pale);color:var(--cyan-dark);border:1px solid rgba(0,180,216,0.25);}
  .section-header{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--cyan-pale);display:flex;align-items:center;gap:8px;}
  .section-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);flex-shrink:0;}
  .treatment-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1.5px solid var(--border);padding:10px 14px;border-radius:10px;transition:border-color 0.15s;}
  .treatment-row:hover{border-color:var(--cyan);}
  .chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);white-space:nowrap;}
  .stat-mini{text-align:center;}
  .stat-mini .val{font-size:15px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;}
  .stat-mini .key{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;}
  .rag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:0.04em;}
  .rag-green{background:var(--green-pale);color:#00a87a;border:1px solid #b3edd9;}
  .rag-amber{background:var(--amber-pale);color:#b45309;border:1px solid #fcd97a;}
  .rag-red{background:var(--red-pale);color:#c0392b;border:1px solid #f5c0be;}
  .rag-none{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
  .tgt-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;}
  .tgt-label{font-size:13px;font-weight:600;color:var(--text);flex:1;min-width:160px;}
  .tgt-inp{background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:7px 12px;font-family:inherit;font-size:13px;width:150px;outline:none;border-radius:7px;}
  .tgt-inp:focus{border-color:var(--cyan);background:#fff;}
  .tgt-current{font-size:11px;color:var(--cyan-dark);font-weight:700;min-width:110px;text-align:right;font-family:'DM Mono',monospace;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;
const SHEETDB_URL="https://sheetdb.io/api/v1/9oq5rqt0vrj1p";
const BRANCHES=["TL","GS","MC","SC"];
const BRANCH_NAMES={TL:"Thonglor",GS:"Gaysorn",MC:"Mahanakorn Cube",SC:"Singha Complex"};
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const TREATMENTS=[
  {key:"cryo_body",       label:"°CRYO Body",          credits:1},
  {key:"cryo_local",      label:"°CRYO Localized",     credits:1},
  {key:"cryo_glow",       label:"°CRYO Glow Facial",   credits:1},
  {key:"freezio",         label:"Freezio",             credits:2},
  {key:"leg_compression", label:"Leg Compression",     credits:1},
  {key:"beauty_angel",    label:"Beauty Angel Facial", credits:1},
  {key:"somadome",        label:"Somadome",            credits:1},
  {key:"slim_body",       label:"°CRYO Slim Body",     credits:7},
  {key:"slim_facial",     label:"°CRYO Slim Facial",   credits:3},
  {key:"red_cupping",     label:"Red Light Cupping",   credits:1},
  {key:"cryo_snow_glow",  label:"°CRYO Snow Glow",     credits:2},
  {key:"contrast_therapy",label:"Contrast Therapy",    credits:2},
];
const TARGET_METRICS=[
  {key:"revenue_total",    label:"Total Revenue",           type:"currency"},
  {key:"total_conductions",label:"Total Conductions",       type:"number"},
  {key:"credit_conductions",label:"Credit Conductions",     type:"number"},
  {key:"unique_clients",   label:"Unique Clients",          type:"number"},
  {key:"first_visit",      label:"First Visit Clients",     type:"number"},
  {key:"rebookings",       label:"Rebookings",              type:"number"},
  {key:"phone_calls",      label:"Phone Calls",             type:"number"},
  {key:"new_bookings_msg", label:"New Bookings (Messaging)",type:"number"},
];
const AMBER=0.15;
const getDaysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
const pad=n=>String(n).padStart(2,"0");
const rowId=(b,y,m,d)=>`${b}_${y}_${pad(m+1)}_${pad(d)}`;
const targetId=(b,y,m)=>`TARGET_${b}_${y}_${pad(m+1)}`;
function fmt(val,type){
  if(val===null||val===undefined||val===""||isNaN(Number(val)))return"—";
  const n=Number(val);
  if(type==="currency")return"฿"+n.toLocaleString("en-US",{maximumFractionDigits:0});
  if(type==="percent")return n.toFixed(1)+"%";
  if(type==="decimal")return n.toFixed(2);
  return n.toLocaleString("en-US",{maximumFractionDigits:0});
}
function getRag(actual,expected){
  if(!expected||expected===0)return"none";
  const p=actual/expected;
  if(p>=1)return"green";
  if(p>=(1-AMBER))return"amber";
  return"red";
}
async function fetchAll(){
  const r=await fetch(SHEETDB_URL);
  if(!r.ok)throw new Error("Fetch failed");
  return r.json();
}
async function upsertRow(data){
  const sr=await fetch(`${SHEETDB_URL}/search?id=${encodeURIComponent(data.id)}`);
  const ex=await sr.json();
  if(Array.isArray(ex)&&ex.length>0){
    const r=await fetch(`${SHEETDB_URL}/id/${encodeURIComponent(data.id)}`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({data})});
    if(!r.ok)throw new Error("Update failed");
  }else{
    const r=await fetch(SHEETDB_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({data})});
    if(!r.ok)throw new Error("Insert failed");
  }
}

function App(){
  const today=new Date();
  const [view,setView]=useState("input");
  const [branch,setBranch]=useState("TL");
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());
  const [day,setDay]=useState(today.getDate());
  const [allRows,setAllRows]=useState([]);
  const [loading,setLoading]=useState(false);
  const [form,setForm]=useState({});
  const [saving,setSaving]=useState(false);
  const [saveMsg,setSaveMsg]=useState("");
  const [dashBranch,setDashBranch]=useState("ALL");
  const [targetInputs,setTargetInputs]=useState({});
  const daysInMonth=getDaysInMonth(year,month);
  const elapsed=(year===today.getFullYear()&&month===today.getMonth())?Math.min(today.getDate(),daysInMonth):daysInMonth;

  const loadAll=useCallback(async()=>{
    setLoading(true);
    try{const rows=await fetchAll();setAllRows(Array.isArray(rows)?rows:[]);}
    catch(e){console.error(e); setAllRows([]);}
    finally{setLoading(false);}
  },[]);
  useEffect(()=>{
    // Render UI immediately, load data in background
    const timer=setTimeout(()=>loadAll(),0);
    return()=>clearTimeout(timer);
  },[loadAll]);

  useEffect(()=>{
    const id=rowId(branch,year,month,day);
    const row=allRows.find(r=>r.id===id);
    if(row){
      const f={};
      TREATMENTS.forEach(t=>{f[t.key]=row[t.key]||"";});
      ["revenue_total","rev_new_single","rev_new_member","unique_clients","first_visit",
       "new_bookings_msg","bd_first_visit","phone_calls","rebookings"].forEach(k=>{f[k]=row[k]||"";});
      setForm(f);
    }else{setForm({});}
  },[branch,year,month,day,allRows]);

  const totalConductions=TREATMENTS.reduce((s,t)=>s+(Number(form[t.key])||0),0);
  const creditConductions=TREATMENTS.reduce((s,t)=>s+(Number(form[t.key])||0)*t.credits,0);
  const revNewSingle=Number(form.rev_new_single)||0;
  const revNewMember=Number(form.rev_new_member)||0;
  const revRenewal=Math.max(0,(Number(form.revenue_total)||0)-revNewSingle-revNewMember);
  const avgCredit=Number(form.unique_clients)>0?(creditConductions/Number(form.unique_clients)).toFixed(2):"—";

  const handleSave=async()=>{
    setSaving(true);setSaveMsg("Saving…");
    try{
      const id=rowId(branch,year,month,day);
      const rowData={id,branch,year:String(year),month:String(month+1),day:String(day),
        revenue_total:form.revenue_total||0,rev_new_single:form.rev_new_single||0,
        rev_new_member:form.rev_new_member||0,rev_excl_member:revNewSingle,rev_renewal:revRenewal,
        total_conductions:totalConductions,credit_conductions:creditConductions,
        unique_clients:form.unique_clients||0,avg_credit_client:avgCredit==="—"?0:avgCredit,
        first_visit:form.first_visit||0,new_bookings_msg:form.new_bookings_msg||0,
        bd_first_visit:form.bd_first_visit||0,phone_calls:form.phone_calls||0,rebookings:form.rebookings||0,
        ...Object.fromEntries(TREATMENTS.map(t=>[t.key,form[t.key]||0])),
      };
      await upsertRow(rowData);
      setAllRows(prev=>[...prev.filter(r=>r.id!==id),rowData]);
      setSaveMsg("✓ Saved");
    }catch(e){setSaveMsg("✗ Failed — try again");console.error(e);}
    setSaving(false);setTimeout(()=>setSaveMsg(""),4000);
  };

  function getTargetRow(b,y,m){return allRows.find(r=>r.id===targetId(b,y,m));}
  function getTargetVal(b,y,m,k){const row=getTargetRow(b,y,m);return row?Number(row[k])||0:0;}
  function getDailyTarget(b,y,m,k){const mo=getTargetVal(b,y,m,k);return mo>0?mo/daysInMonth:0;}

  const handleTargetSave=async(b)=>{
    const inputs=targetInputs[b]||{};
    if(Object.keys(inputs).length===0)return;
    setSaveMsg("Saving targets…");
    try{
      const id=targetId(b,year,month);
      const existing=getTargetRow(b,year,month)||{};
      const rowData={...existing,id,branch:b,year:String(year),month:String(month+1),day:"TARGET",
        ...Object.fromEntries(Object.entries(inputs).map(([k,v])=>[k,v||0]))};
      await upsertRow(rowData);
      setAllRows(prev=>[...prev.filter(r=>r.id!==id),rowData]);
      setTargetInputs(prev=>({...prev,[b]:{}}));
      setSaveMsg("✓ Targets saved");
    }catch{setSaveMsg("✗ Error");}
    setTimeout(()=>setSaveMsg(""),2000);
  };

  function getMonthRows(b,y,m){return allRows.filter(r=>r.branch===b&&String(r.year)===String(y)&&String(r.month)===String(m+1)&&r.day!=="TARGET");}
  function sumField(rows,field,upToDay=null){return rows.filter(r=>upToDay===null||Number(r.day)<=upToDay).reduce((s,r)=>s+(Number(r[field])||0),0);}
  function projectEOM(rows,field,daysTotal,el){if(el===0)return 0;return(sumField(rows,field,el)/el)*daysTotal;}
  const dashBranches=dashBranch==="ALL"?BRANCHES:[dashBranch];
  function aggregated(field,upToDay=elapsed){return dashBranches.reduce((s,b)=>s+sumField(getMonthRows(b,year,month),field,upToDay),0);}
  function projectedAll(field){return dashBranches.reduce((s,b)=>s+projectEOM(getMonthRows(b,year,month),field,daysInMonth,elapsed),0);}
  function aggregatedDailyTarget(k){return dashBranches.reduce((s,b)=>s+getDailyTarget(b,year,month,k),0);}

  const ragColor={green:"var(--green)",amber:"var(--amber)",red:"var(--red)",none:"var(--border2)"};

  function KpiCard({label,field,type="number",highlight,showRag=true}){
    const mtd=aggregated(field),proj=projectedAll(field);
    const dailyTgt=aggregatedDailyTarget(field);
    const monthlyTgt=dailyTgt*daysInMonth;
    const expectedMTD=dailyTgt*elapsed;
    const rag=showRag?getRag(mtd,expectedMTD):"none";
    const pct=expectedMTD>0?Math.min((mtd/expectedMTD)*100,999):null;
    const rc=ragColor[rag];
    return(
      <div className={highlight?"card-hl":"card"} style={{borderLeft:`4px solid ${rag!=="none"?rc:"var(--border)"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div className="lbl" style={{marginBottom:0}}>{label}</div>
          {rag!=="none"&&<span className={`rag rag-${rag}`}>{rag==="green"?"🟢":rag==="amber"?"🟡":"🔴"}{pct!==null?" "+pct.toFixed(0)+"%":""}</span>}
        </div>
        <div className="big-num" style={{color:highlight?"var(--cyan-dark)":"var(--text)"}}>{fmt(mtd,type)}</div>
        <div className="sub-txt">Proj EOM: <strong style={{color:"var(--text2)"}}>{fmt(proj,type)}</strong></div>
        {monthlyTgt>0&&<>
          <div className="sub-txt">Target: {fmt(monthlyTgt,type)}/mo · {fmt(dailyTgt,type==="currency"?"currency":"decimal")}/day</div>
          <div className="prog-track"><div className="prog-fill" style={{width:Math.min(pct||0,100)+"%",background:rc}}/></div>
        </>}
      </div>
    );
  }

  const InputField=({label,fieldKey,auto=false,autoVal=""})=>(
    <div>
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:7}}>
        <div className="lbl" style={{marginBottom:0}}>{label}</div>
        {auto&&<span className="tag-auto">⚡ AUTO</span>}
      </div>
      {auto?<input className="inp" disabled value={autoVal} readOnly/>
        :<input type="number" placeholder="0" className="inp" value={form[fieldKey]||""} onChange={e=>setForm(p=>({...p,[fieldKey]:e.target.value}))}/>}
    </div>
  );

  const controlBar=(
    <div style={{display:"flex",gap:14,alignItems:"flex-end",marginBottom:28,flexWrap:"wrap",background:"var(--surface)",padding:"16px 20px",borderRadius:14,border:"1px solid var(--border)",boxShadow:"var(--shadow)"}}>
      <div><div className="lbl">Month</div>
        <select value={month} onChange={e=>setMonth(Number(e.target.value))}>
          {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
        </select>
      </div>
      <div><div className="lbl">Year</div>
        <select value={year} onChange={e=>setYear(Number(e.target.value))}>
          {[2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}
        </select>
      </div>
    </div>
  );

  return(
    <div>
      {/* HEADER */}
      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:58,position:"sticky",top:0,zIndex:200,boxShadow:"0 2px 12px rgba(0,40,80,0.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div>
            <span style={{fontSize:20,fontWeight:800,letterSpacing:"-0.02em",color:"var(--navy)"}}>°CRYO</span>
            <span style={{fontSize:20,fontWeight:300,color:"var(--cyan)"}}> On</span>
            <span style={{fontSize:10,color:"var(--text3)",marginLeft:10,letterSpacing:"0.12em",fontWeight:600}}>OPS TRACKER</span>
          </div>
          {loading&&<div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:"var(--cyan)",animation:"pulse 1s infinite"}}/>
            <span style={{fontSize:11,color:"var(--text3)"}}>Syncing…</span>
          </div>}
        </div>
        <div style={{display:"flex",gap:5}}>
          {[["input","Daily Input"],["dashboard","Dashboard"],["targets","Targets"],["monthly","Monthly Log"]].map(([v,l])=>(
            <button key={v} className={`nav-btn ${view===v?"active":""}`} onClick={()=>setView(v)}>{l}</button>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {saveMsg&&<span style={{fontSize:12,fontWeight:600,color:saveMsg.startsWith("✓")?"var(--green)":saveMsg.startsWith("✗")?"var(--red)":"var(--text3)"}}>{saveMsg}</span>}
          <div style={{fontSize:12,color:"var(--text3)",fontWeight:500}}>{MONTHS[today.getMonth()].slice(0,3)} {today.getDate()}, {today.getFullYear()}</div>
        </div>
      </div>

      {/* ══ DAILY INPUT ══ */}
      {view==="input"&&(
        <div style={{maxWidth:880,margin:"0 auto",padding:"32px 24px"}}>
          <div style={{display:"flex",gap:14,alignItems:"flex-end",marginBottom:28,flexWrap:"wrap",background:"var(--surface)",padding:"16px 20px",borderRadius:14,border:"1px solid var(--border)",boxShadow:"var(--shadow)"}}>
            <div><div className="lbl">Branch</div>
              <div style={{display:"flex",gap:6}}>{BRANCHES.map(b=><button key={b} className={`br-btn ${branch===b?"active":""}`} onClick={()=>setBranch(b)}>{b}</button>)}</div>
            </div>
            <div><div className="lbl">Month</div>
              <select value={month} onChange={e=>setMonth(Number(e.target.value))}>
                {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
              </select>
            </div>
            <div><div className="lbl">Day</div>
              <select value={day} onChange={e=>setDay(Number(e.target.value))}>
                {Array.from({length:daysInMonth},(_,i)=>i+1).map(d=>(

                      {Array.from({length:daysInMonth},(_,i)=>i+1).map(d=>{
                        const row=rows.find(r=>Number(r.day)===d);
                        const isToday=d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
                        const isFuture=d>today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
                        const dailyRevTgt=getDailyTarget(branch,year,month,"revenue_total");
                        const dayRev=row?Number(row["revenue_total"])||0:0;
                        const dayRag=(!isFuture&&row&&dailyRevTgt>0)?getRag(dayRev,dailyRevTgt):"none";
                        const ragEmoji={green:"🟢",amber:"🟡",red:"🔴",none:""};
                        const ragBorder={green:"#00c89633",amber:"#f59e0b33",red:"#e53e3e33",none:"transparent"};
                        const bg=isToday?"var(--cyan-pale)":row?"var(--surface)":"var(--bg)";
                        const tdS={padding:"9px 14px",textAlign:"right",fontSize:13,color:row?"var(--text2)":"var(--text3)",background:bg,borderBottom:"1px solid var(--border)"};
                        return(
                          <tr key={d} className="tbl-row" style={{borderLeft:dayRag!="none"?"3px solid "+ragBorder[dayRag]:"3px solid transparent"}} onClick={()=>{setDay(d);setView("input");}}>
                            <td style={{...tdS,textAlign:"left",position:"sticky",left:0,fontWeight:isToday?700:500,color:isToday?"var(--cyan-dark)":"var(--text2)",borderRight:"1px solid var(--border)"}}>
                              {d}{isToday?" ●":""}
                            </td>
                            <td style={{...tdS,textAlign:"center",fontSize:16}}>{ragEmoji[dayRag]||(!isFuture&&!row?"·":"")}</td>
                            {cols.map(c=>(<td key={c.key} style={tdS}>{row?fmt(row[c.key],c.type):"·"}</td>))}
                          </tr>
                        );
                      })}
                      <tr style={{background:"var(--navy)"}}>
                        <td style={{padding:"12px 14px",color:"#fff",fontSize:11,fontWeight:700,letterSpacing:"0.1em",position:"sticky",left:0,background:"var(--navy)",borderRight:"1px solid rgba(255,255,255,0.1)"}}>MTD</td>
                        {cols.map(c=><td key={c.key} style={{padding:"12px 14px",textAlign:"right",color:"#fff",fontWeight:700,fontSize:13}}>{fmt(sumField(rows,c.key,elapsed),c.type)}</td>)}
                      </tr>
                      <tr style={{background:"var(--cyan-pale)"}}>
                        <td style={{padding:"12px 14px",color:"var(--cyan-dark)",fontSize:11,fontWeight:700,letterSpacing:"0.1em",position:"sticky",left:0,background:"var(--cyan-pale)",borderRight:"1px solid var(--border)"}}>PROJ EOM</td>
                        {cols.map(c=><td key={c.key} style={{padding:"12px 14px",textAlign:"right",color:"var(--cyan-dark)",fontWeight:600,fontSize:13}}>{fmt(projectEOM(rows,c.key,daysInMonth,elapsed),c.type)}</td>)}
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div style={{padding:"10px 16px",fontSize:11,color:"var(--text3)",borderTop:"1px solid var(--border)"}}>Click any row to edit · MTD = month to date through today</div>
              </div>
              </div>
            );
          })()}
        </div>
      )}
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}`}</style>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
